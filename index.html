<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rothemio</title>
    <!-- Link your CSS, fonts, and meta-tags here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- All your visible website content goes here -->
    <header>
        <h1>Rothemio</h1>
    </header>

    <main>
        <div class="sleek-card">
          <span class="tag">Trending</span>
          <h2 class="title">Modern CSS Architecture</h2>
          <p class="description">Learn how to build highly responsive, visually stunning components using minimal code and modern layout properties.</p>
          <button class="action-btn">Explore Now</button>
        </div>
    </main>

    <style>
        /* Base styles for the sleek card */
    .sleek-card {
      /* Geometry & Rounded Corners */
      width: 340px;
      border-radius: 24px; /* Large, smooth rounding */
      padding: 28px;
      
      /* Color & Transparency */
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px); /* Glassmorphism effect */
      -webkit-backdrop-filter: blur(12px);
      
      /* High-Definition Borders & Shadows */
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.03),
        0 1px 3px rgba(0, 0, 0, 0.02);
      
      /* Layout */
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    /* Micro-interaction on hover */
    .sleek-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
    }
    
    /* Sleek Badge/Tag */
    .tag {
      align-self: flex-start;
      padding: 6px 12px;
      border-radius: 100px; /* Perfect pill shape */
      background: #f0f4f8;
      color: #4a5568;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    /* Typography */
    .title {
      color: #1a202c;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em; /* Tighter tracking for bold text */
      margin: 0;
    }
    
    .description {
      color: #718096;
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
    }
    
    /* Pill-shaped Button */
    .action-btn {
      margin-top: 8px;
      padding: 12px 24px;
      border-radius: 14px; /* Slightly less rounded than the card for visual balance */
      border: none;
      background: #111111;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    
    .action-btn:hover {
      background: #2d3748;
    }
    </style>
    <footer>
        <p>&copy; 2026 XYZ Machine</p>
    </footer>
  
    <script>
      
    </script>
</body>
</html>
